name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install (client only — base dependencies)
        run: uv sync --extra dev

      - name: Smoke import
        run: uv run python -c "from ragrep import cli, config, server, models; print('imports ok')"

      - name: Build wheel + sdist
        run: uv build

      - name: Verify wheel installs as a tool from /tmp
        run: |
          cd /tmp
          uv tool install --force "$GITHUB_WORKSPACE/dist/ragrep-"*"-py3-none-any.whl"
          ragrep --help >/dev/null
          uv tool uninstall ragrep
